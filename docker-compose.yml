version: "3.9"

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - hng_net

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - nextcloud
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - hng_net

  detector:
    build: ./detector
    container_name: detector
    restart: unless-stopped

    # REQUIRED for iptables to work
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW

    depends_on:
      - nginx

    ports:
    - "5000:5000"  

    volumes:
      - HNG-nginx-logs:/logs:ro

    networks:
      - hng_net

volumes:
  HNG-nginx-logs:

networks:
  hng_net:
    driver: bridge
